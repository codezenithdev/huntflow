# Keyword-based job search configuration (NOT a company list)
# HuntFlow discovers jobs by searching with keywords across the entire market

search_queries:
  primary:
    - "founding engineer"
    - "backend engineer"
    - "full stack engineer"
    - "software engineer"
    - "AI engineer"
    - "ML engineer"
    - "platform engineer"
  secondary:
    - "senior software engineer"
    - "senior backend engineer"
    - "staff engineer"
    - "infrastructure engineer"
    - "DevOps engineer"
    - "cloud engineer"
    - "data engineer"
    - "site reliability engineer"

filters:
  us_location_signals:
    - "united states"
    - "usa"
    - " us "
    - "remote"
    - "anywhere"
    - "new york"
    - "san francisco"
    - "seattle"
    - "austin"
    - "chicago"
    - "boston"
    - "los angeles"
    - "denver"
    - "atlanta"
    - "miami"
  exclude_titles:
    - "manager"
    - "director"
    - "vp "
    - "president"
    - "head of product"
    - "designer"
    - "sales"
    - "marketing"
    - "finance"
    - "legal"
    - "recruiter"
  min_jd_length: 200
  max_jobs_per_source: 100

scoring:
  preferred_titles: ["founding", "staff", "lead", "principal"]
  min_score_to_track: 30
  min_score_to_research: 65

job_boards:
  ashby:
    enabled: true
    rate_limit: 5
  wellfound:
    enabled: true
    rate_limit: 10
  yc:
    enabled: true
    rate_limit: 5
  remotive:
    enabled: true
    rate_limit: 20
  greenhouse:
    enabled: true
    rate_limit: 5
  linkedin:
    enabled: true
    mode: rss  # rss | cookie | rapidapi
    rss_pages: 3  # pages to paginate (25 results each = 75 per query)
    fetch_full_jd: true  # attempt to fetch full JD from public page
    full_jd_timeout: 10  # seconds before giving up on full JD fetch
    circuit_breaker_threshold: 3  # consecutive failures before cooling down
    circuit_breaker_cooldown: 7200  # seconds (2 hours)
