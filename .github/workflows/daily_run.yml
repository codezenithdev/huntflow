name: HuntFlow Daily Run

on:
  schedule:
    - cron: '0 13 * * *'       # 8am CST daily
    - cron: '0 0 * * *'        # 6pm CST digest
    - cron: '0 14 * * 1,3,5'   # 9am CST Mon/Wed/Fri outreach
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        default: 'daily'
        type: choice
        options: [daily, digest, outreach]

jobs:
  hunt:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - run: pip install -r requirements.txt
      
      - run: python -m spacy download en_core_web_sm

      - uses: actions/cache@v4
        with:
          path: data/huntflow.db
          key: huntflow-db-${{ github.run_number }}
          restore-keys: huntflow-db-
      
      - uses: actions/cache@v4
        with:
          path: data/chromadb
          key: huntflow-chroma-${{ github.run_number }}
          restore-keys: huntflow-chroma-
      
      - run: mkdir -p data/resumes data/outreach data/prep logs
      
      - name: Run HuntFlow
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          LLM_PROVIDER: groq
          LLM_MODEL: llama3-8b-8192
          SQLITE_DB_PATH: ./data/huntflow.db
          CHROMADB_PATH: ./data/chromadb
          MAX_JOBS_PER_RUN: '150'
        run: python scheduler/scheduler.py --once --job ${{ github.event.inputs.job || 'daily' }}
      
      - uses: actions/cache@v4
        if: always()
        with:
          path: data/huntflow.db
          key: huntflow-db-${{ github.run_number }}
      
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: outputs-${{ github.run_number }}
          path: |
            data/outreach/
            data/prep/
          retention-days: 7
