version: '3.9'

services:
  huntflow:
    build: .
    container_name: huntflow
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"

  dashboard:
    image: streamlit/streamlit:latest
    container_name: huntflow-dashboard
    restart: unless-stopped
    volumes:
      - ./data:/app/data:ro
      - ./dashboard:/app
    ports:
      - "8501:8501"
    depends_on:
      - huntflow
    command: streamlit run /app/dashboard.py --server.port=8501 --server.address=0.0.0.0
